version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: thistory_postgres
    environment:
      POSTGRES_DB: thistory
      POSTGRES_USER: thistory_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thistory_user"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
